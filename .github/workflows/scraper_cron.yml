name: Automatic Helpline Scraper Cron

on:
  schedule:
    # ⏰ Har 12 ghante me ek baar chalega (Subah 9 baje aur Shaam 9 baje UTC)
    - cron: '0 9,21 * * *'
  workflow_dispatch:        # Manual 'Run workflow' ka button bhi chalega

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 🚀 Nayi official SDK aur required libraries yahan install ho rahi hain
          pip install google-genai supabase python-dotenv

      - name: Execute Extractor Script with Hidden Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # 🎯 Aapka zero-retry wala smart code yahan se trigger hoga
        run: python3 secure_extractor.py