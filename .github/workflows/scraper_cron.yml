name: Automatic Helpline Scraper Cron

on:
  schedule:
    # Yeh har 4 ghante mein ek baar background mein script ko automatic trigger karega
    - cron: '0 */4 * * *' 
  workflow_dispatch: # Isse aap GitHub portal se "Run manual" par click karke bhi test kar sakte hain

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run Secure Extractor Script
      run: python secure_extractor.py