name: Automatic Helpline Scraper Cron

on:
  schedule:
    - cron: '30 07 * * *' # Yeh 1:00 PM IST (India time) par chalega
  workflow_dispatch:      # Manual 'Run workflow' ka button bhi chalega

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 🚀 Google ki nayi GenAI SDK aur required libraries
          pip install google-genai supabase python-dotenv

      - name: Execute Extractor Script with Hidden Secrets
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        # 🎯 Debugger enabled Python script trigger
        run: python3 secure_extractor.py