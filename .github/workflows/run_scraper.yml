name: Run Corporate Helpline Scraper

on:
  schedule:
    - cron: '0 */4 * * *' # Har 4 ghante mein automatic chalne ke liye
  workflow_dispatch: # Taaki aap GitHub UI par manually button dabaakar bhi run kar sakein

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install google-generativeai supabase

    - name: Execute Extractor Script with Hidden Secrets
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python secure_extractor.py